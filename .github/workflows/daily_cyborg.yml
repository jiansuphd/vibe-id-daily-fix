name: Daily Cyborg Report

on:
  schedule:
    - cron: '30 23 * * *' # 11:30 PM UTC (just before the midnight deploy)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Cyborg Aggregator
        run: npm run cyborg

      - name: Commit and Push Report
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add 10_dailies/
          if git diff --cached --quiet; then
            echo "No new trends found today."
          else
            git commit -m "🤖 auto: generate daily cyborg report"
            git push origin main
          fi
